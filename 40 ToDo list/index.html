<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Todo List</title>
  </head>
  <body>
    <h1>ToDo</h1>
    <form id="form">
      <input
        type="text"
        class="input"
        id="input"
        placeholder="Enter task"
        autocomplete="off"
      />
      <ul class="todos" id="todos"></ul>
    </form>
    <small>
      Right click to Delete the Task<br />
      Left click to toggle Cross the Task
    </small>
    <script src="script.js"></script>
  </body>
</html>
